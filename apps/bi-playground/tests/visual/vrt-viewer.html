<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>VRT Visual Regression</title>
<style>
:root {
  --bg: #ffffff;
  --surface: #f6f8fa;
  --surface2: #f0f2f5;
  --border: #d0d7de;
  --border-light: #e8ecf0;
  --text: #1f2328;
  --text2: #656d76;
  --text3: #8b949e;
  --fail: #cf222e;
  --fail-light: #ffebe9;
  --fail-border: #ffa198;
  --pass: #1a7f37;
  --pass-light: #dafbe1;
  --pass-border: #4ac26b;
  --accent: #0969da;
  --accent-light: #ddf4ff;
  --shadow: 0 1px 3px rgba(31,35,40,0.08);
  --radius: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', sans-serif; background: var(--bg); color: var(--text); }

/* ===== Top bar ===== */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 52px;
  display: flex; align-items: center; gap: 16px;
  box-shadow: var(--shadow);
}
.topbar-logo {
  font-size: 15px; font-weight: 700; color: var(--text);
  letter-spacing: -0.3px;
  display: flex; align-items: center; gap: 8px;
}
.topbar-logo svg { flex-shrink: 0; }
.topbar-sep { width: 1px; height: 24px; background: var(--border); }

/* Run selector */
.run-select-wrap { position: relative; }
.run-select {
  appearance: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 32px 6px 12px;
  font-size: 13px;
  color: var(--text);
  cursor: pointer;
  font-family: inherit;
  outline: none;
  min-width: 200px;
}
.run-select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(9,105,218,0.15); }
.run-select-arrow {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  pointer-events: none; color: var(--text3); font-size: 10px;
}

/* Summary chips in topbar */
.topbar-chips { display: flex; gap: 8px; margin-left: auto; }
.chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 12px;
  font-size: 12px; font-weight: 600;
}
.chip.fail { background: var(--fail-light); color: var(--fail); border: 1px solid var(--fail-border); }
.chip.pass { background: var(--pass-light); color: var(--pass); border: 1px solid var(--pass-border); }

/* ===== Layout ===== */
.layout {
  display: flex;
  height: calc(100vh - 52px);
  overflow: hidden;
}

/* ===== Sidebar: test list ===== */
.sidebar {
  width: 320px; min-width: 320px;
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  background: var(--surface);
}
.sidebar-head {
  padding: 16px;
  border-bottom: 1px solid var(--border-light);
  font-size: 12px; font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.sidebar-list { flex: 1; overflow-y: auto; padding: 8px; }
.sidebar-list::-webkit-scrollbar { width: 5px; }
.sidebar-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.test-item {
  padding: 10px 12px;
  border-radius: 6px;
  cursor: pointer;
  margin-bottom: 2px;
  border: 1px solid transparent;
  transition: all 0.1s;
}
.test-item:hover { background: var(--bg); border-color: var(--border-light); }
.test-item.active { background: var(--bg); border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
.test-item .row1 { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
.test-item .fixture { font-size: 13px; font-weight: 500; color: var(--text); }
.test-item .meta-line { font-size: 12px; color: var(--text3); }
.test-item .meta-line span { margin-right: 8px; }
.test-item .diff-tag {
  display: inline-block; padding: 1px 6px; border-radius: 4px;
  font-size: 11px; font-family: monospace; font-weight: 500;
  background: var(--fail-light); color: var(--fail);
}

/* ===== Main: diff viewer ===== */
.main { flex: 1; overflow-y: auto; padding: 24px; }
.main::-webkit-scrollbar { width: 6px; }
.main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.diff-header {
  margin-bottom: 20px;
}
.diff-header h2 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.diff-header .tags { display: flex; gap: 8px; }
.diff-header .tag {
  font-size: 12px; padding: 2px 10px; border-radius: 4px;
  background: var(--surface2); color: var(--text2); font-weight: 500;
}
.diff-header .tag.fail-tag { background: var(--fail-light); color: var(--fail); }

.diff-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.diff-panel {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  overflow: hidden;
}
.diff-panel-title {
  padding: 8px 14px;
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--text2);
  border-bottom: 1px solid var(--border-light);
  background: var(--surface2);
}
.diff-panel-img {
  padding: 12px;
  display: flex; justify-content: center; align-items: flex-start;
  min-height: 200px;
}
.diff-panel-img img {
  max-width: 100%;
  border-radius: 4px;
  border: 1px solid var(--border-light);
  background: #fff;
}
.diff-panel-img .na {
  color: var(--text3); font-size: 13px; padding: 60px 0;
}

/* Empty state */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; color: var(--text3); text-align: center; padding: 40px;
}
.empty-state svg { margin-bottom: 16px; opacity: 0.4; }
.empty-state h3 { font-size: 15px; color: var(--text2); margin-bottom: 4px; }
.empty-state p { font-size: 13px; }

/* All-pass state */
.all-pass {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; text-align: center;
}
.all-pass-icon {
  width: 64px; height: 64px; border-radius: 50%;
  background: var(--pass-light); color: var(--pass);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; margin-bottom: 16px;
}
.all-pass h3 { font-size: 16px; margin-bottom: 4px; }
.all-pass p { font-size: 13px; color: var(--text2); }

/* Loading */
.loading {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; color: var(--text3); text-align: center;
}
.loading .spinner {
  width: 32px; height: 32px; border: 3px solid var(--border-light);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin-bottom: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <path d="M3 9h18M9 3v18"/>
    </svg>
    VRT Report
  </div>
  <div class="topbar-sep"></div>
  <div class="run-select-wrap">
    <select class="run-select" id="runSelect" onchange="onRunChange()"></select>
    <span class="run-select-arrow">&#9662;</span>
  </div>
  <div class="topbar-chips" id="topbarChips"></div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-head" id="sidebarHead">Failures</div>
    <div class="sidebar-list" id="sidebarList"></div>
  </div>
  <div class="main" id="mainContent">
    <div class="loading" id="loadingState">
      <div class="spinner"></div>
      <p>Loading runs...</p>
    </div>
  </div>
</div>

<script>
var RUNS_SUMMARY = null;
var RUNS_CACHE = {};
var RUNS_BASE = '.runs';

// ---- Init ----
(function init() {
  fetch(RUNS_BASE + '/manifest.json')
    .then(function(r) { return r.ok ? r.json() : []; })
    .then(function(runs) {
      RUNS_SUMMARY = runs;
      var sel = document.getElementById('runSelect');
      if (runs.length === 0) {
        sel.disabled = true;
        var opt = document.createElement('option');
        opt.textContent = 'No runs found';
        sel.appendChild(opt);
        document.getElementById('mainContent').innerHTML =
          '<div class="empty-state">' +
            '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">' +
              '<rect x="3" y="3" width="18" height="18" rx="2"/>' +
              '<path d="M3 9h18M9 3v18"/>' +
            '</svg>' +
            '<h3>No VRT runs found</h3>' +
            '<p>Run <code>pnpm test:visual</code> to generate reports.</p>' +
          '</div>';
        return;
      }
      runs.forEach(function(r, i) {
        var opt = document.createElement('option');
        opt.value = i;
        opt.textContent = r.date + (r.failed > 0 ? '  (' + r.failed + ' failed)' : '  (passed)');
        sel.appendChild(opt);
      });
      onRunChange();
    })
    .catch(function() {
      document.getElementById('mainContent').innerHTML =
        '<div class="empty-state">' +
          '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">' +
            '<rect x="3" y="3" width="18" height="18" rx="2"/>' +
            '<path d="M3 9h18M9 3v18"/>' +
          '</svg>' +
          '<h3>No VRT runs found</h3>' +
          '<p>Run <code>pnpm test:visual</code> to generate reports.</p>' +
        '</div>';
    });
})();

function onRunChange() {
  var idx = parseInt(document.getElementById('runSelect').value, 10);
  var summary = RUNS_SUMMARY[idx];

  // Topbar chips
  var chips = document.getElementById('topbarChips');
  chips.innerHTML = summary.failed > 0
    ? '<span class="chip fail">' + summary.failed + ' failed</span>'
    : '<span class="chip pass">All passed</span>';

  // Check cache
  if (RUNS_CACHE[summary.id]) {
    renderRun(RUNS_CACHE[summary.id]);
    return;
  }

  // Fetch run detail
  var main = document.getElementById('mainContent');
  main.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading run data...</p></div>';

  fetch(RUNS_BASE + '/' + summary.id + '/manifest.json')
    .then(function(r) { return r.ok ? r.json() : { tests: [] }; })
    .then(function(detail) {
      // Prefix image paths with run base
      detail.tests = detail.tests.map(function(t) {
        return {
          fixture: t.fixture,
          theme: t.theme,
          viewport: t.viewport,
          px: t.px,
          ratio: t.ratio,
          baseline: t.baseline ? RUNS_BASE + '/' + summary.id + '/' + t.baseline : '',
          actual: t.actual ? RUNS_BASE + '/' + summary.id + '/' + t.actual : '',
          diff: t.diff ? RUNS_BASE + '/' + summary.id + '/' + t.diff : '',
        };
      });
      RUNS_CACHE[summary.id] = detail;
      renderRun(detail);
    })
    .catch(function() {
      main.innerHTML =
        '<div class="empty-state">' +
          '<h3>Failed to load run data</h3>' +
          '<p>Could not read manifest for ' + esc(summary.id) + '</p>' +
        '</div>';
    });
}

function renderRun(run) {
  var head = document.getElementById('sidebarHead');
  var list = document.getElementById('sidebarList');

  if (run.tests.length === 0) {
    head.textContent = 'Results';
    list.innerHTML = '';
    document.getElementById('mainContent').innerHTML =
      '<div class="all-pass"><div class="all-pass-icon">&#10003;</div>' +
      '<h3>All tests passed</h3><p>No visual differences detected in this run.</p></div>';
    return;
  }

  head.textContent = run.tests.length + ' failure' + (run.tests.length > 1 ? 's' : '');
  var idx = parseInt(document.getElementById('runSelect').value, 10);
  list.innerHTML = run.tests.map(function(t, ti) {
    return '<div class="test-item" data-idx="' + ti + '" onclick="onTestClick(' + ti + ')">' +
      '<div class="row1"><span class="fixture">' + esc(t.fixture) + '</span></div>' +
      '<div class="meta-line"><span>' + esc(t.theme) + '</span><span>' + esc(t.viewport) + '</span>' +
      '<span class="diff-tag">' + t.px + ' px</span></div></div>';
  }).join('');

  onTestClick(0);
}

function onTestClick(testIdx) {
  var idx = parseInt(document.getElementById('runSelect').value, 10);
  var run = RUNS_CACHE[RUNS_SUMMARY[idx].id];
  var t = run.tests[testIdx];

  document.querySelectorAll('.test-item').forEach(function(el, i) {
    el.classList.toggle('active', i === testIdx);
  });

  var main = document.getElementById('mainContent');
  main.innerHTML =
    '<div class="diff-header">' +
      '<h2>' + esc(t.fixture) + '</h2>' +
      '<div class="tags">' +
        '<span class="tag">' + esc(t.theme) + '</span>' +
        '<span class="tag">' + esc(t.viewport) + '</span>' +
        '<span class="tag fail-tag">' + t.px + ' px diff</span>' +
      '</div>' +
    '</div>' +
    '<div class="diff-grid">' +
      '<div class="diff-panel"><div class="diff-panel-title">Baseline</div><div class="diff-panel-img">' +
        (t.baseline ? '<img src="' + t.baseline + '" loading="lazy"/>' : '<div class="na">No baseline</div>') +
      '</div></div>' +
      '<div class="diff-panel"><div class="diff-panel-title">Actual</div><div class="diff-panel-img">' +
        (t.actual ? '<img src="' + t.actual + '" loading="lazy"/>' : '<div class="na">No capture</div>') +
      '</div></div>' +
      '<div class="diff-panel"><div class="diff-panel-title">Diff</div><div class="diff-panel-img">' +
        (t.diff ? '<img src="' + t.diff + '" loading="lazy"/>' : '<div class="na">No diff</div>') +
      '</div></div>' +
    '</div>';
}

function esc(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
