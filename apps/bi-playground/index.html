<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BI Engine Playground</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: system-ui, -apple-system, sans-serif; background-color: #f5f5f5; transition: background-color 0.2s; }
    </style>
    <script>
      // Prevent white flash: sync initial background from persisted theme
      // Storage key must match: apps/bi-playground/src/stores/useThemeStore.ts STORAGE_KEY
      (function() {
        try {
          var raw = localStorage.getItem('bi-playground-theme');
          if (raw) {
            var data = JSON.parse(raw);
            if (data.mode === 'dark') {
              document.documentElement.dataset.theme = 'dark';
              document.body.style.backgroundColor = '#141414';
            }
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
